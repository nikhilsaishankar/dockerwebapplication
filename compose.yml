version: "3.9"
services:
  devopsdb:
    image: nikhilkotharu/dockerapp:db
    ports:
      - "3306:3306"
    deploy:
      replicas: 3
      restart_policy:
        condition: any    
      resources:
        limits:
          cpus: '0.3'
          memory: '256m'
        reservations:
          cpus: '0.1'
          memory: '128m'
    networks:
      - mynetwork
    volumes:
      - db_volume:/opt/nikhil

  application:
    image: nikhilkotharu/dockerapp:web
    ports:
      - "7777:8080"
    deploy:
      replicas: 3
      restart_policy:
        condition: any    
      resources:
        limits:
          cpus: '0.3'
          memory: '256m'
        reservations:
          cpus: '0.1'
          memory: '128m'
    depends_on:
      - devopsdb
    networks:
      - mynetwork
    volumes:
      - app_volume:/opt/nikhil

networks:
  mynetwork:
    driver: overlay
volumes:
  db_volume:
  app_volume:
